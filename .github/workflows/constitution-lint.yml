name: constitution-lint

# Augur §8.3 機器稽核 CI（骨架）——依《憲章展開總綱》§5.4、AUGUR-MC v1.3 §8.3。
# compliance_lint 管規格生效（本 repo）；audit_lint 管 code 合憲（於 augur code repo 之 CI 接線，後續階段）。
# 治權自動化止於「判定與阻擋」——本 CI 只報 finding／擋 error，決不改內容或自動 apply（P5.W2）。
#
# 接線記錄：2026-07-18 依 RULING-2026-012 主文二(e) 接線（#22 前置已解除、corpus 7/7 PASS）。
# selftest 與 compliance-lint 必過（error 阻斷）；warning/info 不阻斷。
# 本檔自 tools/constitution_lint/github-workflow.yml 模板萃取；權威數字綁定留在模板側（--sync 標的），本檔為執行體不載綁定。

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 紅綠自檢（WM v1.0 綠 / 壞樣本紅）
        run: python -m tools.constitution_lint --selftest
      - name: compliance-lint 全規格（error 阻斷、warning 不阻斷）
        shell: bash
        run: |
          # 受檢 corpus 之定義**只有一處**：`report.corpus_files`（六份生效本＋尚無生效本之
          # draft；歸檔本除外）。前版此處為 `find specs -name '*.md'`，列舉 13 份（含 6 份
          # 歸檔 draft），與本檔橫幅之七份/200 **不符**——CI 實際所檢與文件所載分家，正是
          # 本工具要撲滅之病。改由 `report --files` 列舉，二者自此不可能再分家。
          mapfile -t specs < <(python -m tools.constitution_lint report --files)
          test "${#specs[@]}" -gt 0 || { echo "corpus 為空——report --files 異常"; exit 1; }
          python -m tools.constitution_lint compliance "${specs[@]}"
