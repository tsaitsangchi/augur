# §8.4 期限豁免」——見 HANDOFF.md 待裁 #22。
#
# 【實測數量（Measure 階段實填，硬化後之現行工作區 gate）】
#   產生指令（於 repo 根 /home/giga/augur/augur-constitution 執行）：
#     for f in specs/*-SPECIFICATION*.md; do python3 -m tools.constitution_lint compliance "$f"; done
#     （glob 須為 -SPECIFICATION*.md：前版寫 -SPECIFICATION.md，漏掉 L7 之 -v0.1-draft.md，
#      照該指令重跑僅得六份/152，與下表七份/200 不符——2026-07-17 由獨立驗證官實測揪出並更正。
#      注意此 glob 亦會納入 specs/*-v0.1-draft.md 歸檔本；下表為「六份生效本＋L7 draft」之七份。）
#   結果：七份受檢規格 6 FAIL / 1 PASS；error 合計 200 筆（全部為 WM.44-LABEL，非 LABEL error 為 0）
#     L1 WORLD-MODEL          error  0  ✅ PASS（唯一通過者）
#     L2 ONTOLOGY             error  1  ❌ FAIL（Annex TR 標題為 h1 致零覆蓋，強制發聲）
#     L3 IDENTITY             error 31  ❌ FAIL
